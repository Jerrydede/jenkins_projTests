stages:
  - test

# Wir nehmen ein stabiles, etwas kleineres Image
image: cypress/base:20.16.0

cypress-test:
  stage: test
  script:
    - npm install
    # Wir lassen Cypress erst einmal im "Electron" Browser laufen (standard)
    # Das braucht am wenigsten Ressourcen
    - npx cypress run
  allow_failure: true # Die Pipeline bleibt grün/gelb, auch wenn Tests scheitern
  artifacts:
    when: always
    paths:
      - cypress/screenshots
      - cypress/reports